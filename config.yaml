# Projects — add or remove freely.
# Set featured: true to show on the homepage preview (max ~3 recommended).
# image: path relative to site root, or a full URL.
projects:
  - title: Forum
    description: >
      A full-stack single-page application built from scratch in Go and vanilla JavaScript —
      no frameworks on either end. Implements the full auth lifecycle: registration, bcrypt
      password hashing, UUID session tokens stored in cookies with expiration. The backend
      covers SQLite schema design with entity relationships, HTTP routing, CRUD operations,
      and Docker containerisation. On the frontend, the SPA architecture handles client-side
      routing and dynamic rendering without React or any other library — just the platform.
    image: images/forum.png
    url: https://github.com/rodneyo1/forum
    page: forum.html
    tags: [Go, SQLite, JavaScript, Docker, HTTP, Auth]
    featured: true

  - title: Lem-in
    description: >
      An ant colony pathfinding simulator that pushes algorithmic thinking to its limits.
      Given an arbitrary graph of rooms and tunnels, the program must route n ants from
      source to sink in the minimum number of turns — a problem that sits at the intersection
      of BFS shortest-path search, max-flow / min-cut optimisation, and multi-agent scheduling.
      The real difficulty is in coordinating simultaneous movement across non-conflicting paths:
      each tunnel handles one ant per turn, each room holds one ant at a time. Implemented in
      Go with full input validation, cycle detection, and disconnected-graph handling.
    image: images/lemin.png
    url: https://github.com/rodneyo1/lem-in
    page: lemin.html
    tags: [Go, BFS, Graph Theory, Dynamic Programming, Algorithms]
    featured: true

  - title: Pacman
    description: >
      A faithful Pac-Man recreation built in vanilla JavaScript with zero frameworks and no
      canvas element — rendered entirely through the DOM. The technical constraint forces a
      deep understanding of browser rendering: layout, paint, and composite phases all matter
      when the target is a locked 60 FPS with no frame drops. Achieved via a tight
      requestAnimationFrame loop, minimal layer usage, and continuous profiling with DevTools.
      Includes ghost AI, collision detection, pause/restart mechanics, score tracking, and lives.
    image: images/pacman.png
    url: https://github.com/rodneyo1/pacman
    page: pacman.html
    tags: [JavaScript, DOM, Game Dev, Performance, 60fps]
    featured: true

  - title: Wget
    description: >
      A ground-up clone of the GNU wget utility written in Go. Downloads single files or
      entire websites, parsing HTML and CSS to recursively discover and fetch linked resources
      while preserving directory structure. Concurrent downloads are managed with goroutines
      and semaphores to control parallelism without overwhelming the host. Also implements
      bandwidth throttling with precise timing, background execution with log output, and
      offline link conversion — rewriting absolute URLs to local relative paths after mirroring.
    image: images/wget.png
    url: https://github.com/rodneyo1/wget-go
    page: wget.html
    tags: [Go, Concurrency, Networking, HTTP, Goroutines]

  - title: Netfix
    description: >
      A service marketplace platform built with Django and Python. Companies register and
      list services by trade (plumbing, carpentry, painting, etc.); customers browse, request,
      and track them. Covers the full Django stack — models, views, URL routing, form handling,
      template rendering, and database migrations — with two distinct user registration flows,
      relational data modelling, and business logic constraints enforced at the model layer.
    image: images/netfix.png
    url: https://github.com/rodneyo1/netfix
    page: netfix.html
    tags: [Python, Django, SQLite, Full-Stack]

